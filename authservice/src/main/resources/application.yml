server:
  port: 8081

spring:
  application:
    name: auth-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

# Remove the spring.mail configuration entirely
# Email is now handled by the Flask microservice

# Email Service Configuration
email:
  service:
    url: ${EMAIL_SERVICE_URL:https://taxinstant.pythonanywhere.com}  # Change to your deployed URL
    # For Railway: https://your-email-service.railway.app
    # For PythonAnywhere: https://yourusername.pythonanywhere.com

